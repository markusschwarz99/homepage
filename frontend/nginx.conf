server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security-Header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content-Security-Policy
    # - script-src 'self': nur eigene Scripts (kein inline-JS, keine externen CDNs)
    # - style-src 'self' 'unsafe-inline': Tailwind generiert inline-Styles
    # - img-src erlaubt eigene Bilder, data: (SVG-icons) und api.markus-schwarz.cc (uploads)
    # - connect-src: API-Aufrufe zum Backend
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://api.markus-schwarz.cc; font-src 'self' data:; connect-src 'self' https://api.markus-schwarz.cc; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # HSTS wird ohnehin von Cloudflare gesetzt — hier sicherheitshalber nicht nochmal

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets länger cachen
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
